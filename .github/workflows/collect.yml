name: Collect YouTube analytics

on:
  schedule:
    # 02:00 UTC = 05:00 Riga (EEST, UTC+3). Note GitHub runs cron in UTC and
    # does not follow daylight saving, so in winter (EET, UTC+2) this lands at
    # 04:00 local. Adjust to '0 3 * * *' if you want 05:00 year-round in winter.
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      create_jobs:
        description: 'Create reporting jobs for any report type missing one'
        type: boolean
        default: false
      dry_run:
        description: 'Show what would happen without writing'
        type: boolean
        default: false

concurrency:
  # Never let two runs commit to the same branch at once.
  group: collect
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # No third-party dependencies: the scripts use only the standard library.

      - name: Collect reports
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.create_jobs }}" = "true" ]; then ARGS="$ARGS --create-jobs"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python collect.py $ARGS

      - name: Build summaries
        if: ${{ inputs.dry_run != true }}
        run: python summarize.py

      - name: Commit new data
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "data: collector run $(date -u +'%Y-%m-%d %H:%M UTC')"
            # Guard against a race with any concurrent push.
            git pull --rebase --autostash origin ${{ github.ref_name }} || true
            git push
          fi

      - name: Summarise run
        if: always()
        run: |
          echo "### Collector run" >> $GITHUB_STEP_SUMMARY
          if [ -f data/state.json ]; then
            python - <<'PY' >> $GITHUB_STEP_SUMMARY
          import json, os
          s = json.load(open('data/state.json'))
          runs = s.get('runs', [])
          print(f"- Jobs tracked: **{len(s.get('jobs', {}))}**")
          if runs:
              r = runs[-1]
              print(f"- Last run: {r['at']}")
              print(f"- New: **{r['new']}**, backfilled: **{r['backfilled']}**, failed: **{r['failed']}**")
          total = 0
          for root, _, files in os.walk('data/reports'):
              total += sum(1 for f in files if f.endswith('.json'))
          print(f"- Archived day-shards: **{total}**")
          PY
          else
            echo "No state file yet." >> $GITHUB_STEP_SUMMARY
          fi
