<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLMariss · YouTube analytics</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --line: #262b36;
    --text: #e6e9ef; --muted: #949cad; --accent: #5b9dff;
    --good: #4ec98a; --warn: #f0b34a; --bad: #e5675f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    padding: 18px 24px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
  }
  h1 { font-size: 17px; margin: 0; font-weight: 600; }
  .stamp { color: var(--muted); font-size: 12px; }
  .wrap { padding: 20px 24px 60px; max-width: 1400px; }
  .metrics { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .metric {
    background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
    padding: 10px 14px; min-width: 130px;
  }
  .metric .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
  .metric .value { font-size: 20px; font-weight: 600; margin-top: 2px; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 14px; }
  button, select, input {
    background: var(--panel); color: var(--text); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 12px; font: inherit; cursor: pointer;
  }
  button.active { background: var(--accent); border-color: var(--accent); color: #05070c; font-weight: 600; }
  input[type=search] { cursor: text; min-width: 220px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: right; padding: 8px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; white-space: normal; min-width: 280px; }
  th { color: var(--muted); font-weight: 500; cursor: pointer; user-select: none; font-size: 12px; }
  th:hover { color: var(--text); }
  tbody tr:hover { background: #1c2029; }
  .title-cell { display: flex; gap: 10px; align-items: center; }
  .title-cell img { width: 64px; height: 36px; object-fit: cover; border-radius: 4px; flex: none; }
  .title-cell .sub { color: var(--muted); font-size: 11px; }
  .notice {
    background: var(--panel); border: 1px solid var(--line);
    border-left: 3px solid var(--warn); border-radius: 8px;
    padding: 14px 16px; margin-bottom: 16px; font-size: 13px;
  }
  .notice.error { border-left-color: var(--bad); }
  .notice code { background: #0b0d12; padding: 1px 5px; border-radius: 3px; }
  .hidden { display: none; }
  .good { color: var(--good); } .warn { color: var(--warn); } .bad { color: var(--bad); }
  .spark { display: block; }
</style>
</head>
<body>

<header>
  <h1>MLMariss · YouTube analytics</h1>
  <span class="stamp" id="stamp">loading…</span>
</header>

<div class="wrap">

  <div id="notice" class="notice hidden"></div>

  <div class="metrics" id="metrics"></div>

  <div class="controls">
    <span style="color:var(--muted);font-size:12px;">Window:</span>
    <button data-window="7d">7 days</button>
    <button data-window="28d">28 days</button>
    <button data-window="90d" class="active">90 days</button>
    <button data-window="365d">365 days</button>
    <button data-window="all">All time</button>
    <input type="search" id="search" placeholder="Filter titles…" />
  </div>

  <svg id="spark" class="spark hidden" width="100%" height="90"></svg>

  <table id="tbl">
    <thead>
      <tr>
        <th data-sort="title">Video</th>
        <th data-sort="impressions">Impressions</th>
        <th data-sort="ctr">CTR</th>
        <th data-sort="views">Views</th>
        <th data-sort="avg_view_percentage">Retention</th>
        <th data-sort="watch_time_minutes">Watch time</th>
        <th data-sort="subscribers_gained">Subs</th>
        <th data-sort="engagement">Engagement</th>
      </tr>
    </thead>
    <tbody id="rows"></tbody>
  </table>

</div>

<script>
// This dashboard is read-only. There is no OAuth, no API key and no login:
// the GitHub Actions collector writes data/*.json and this page just reads it.
let SUMMARY = null, DAILY = null;
let currentWindow = '90d', sortKey = 'impressions', sortDir = -1, filter = '';

const fmt = n => {
  if (n === null || n === undefined || isNaN(n)) return '—';
  n = Number(n);
  if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1) + 'K';
  return Math.round(n).toLocaleString();
};
const pct = n => (n === null || n === undefined || isNaN(n)) ? '—' : Number(n).toFixed(1) + '%';
const mins = m => {
  if (!m) return '—';
  const h = Math.floor(m/60), r = Math.round(m%60);
  return h > 0 ? `${h}h ${r}m` : `${r}m`;
};

function notice(html, isError) {
  const el = document.getElementById('notice');
  el.innerHTML = html;
  el.classList.toggle('error', !!isError);
  el.classList.remove('hidden');
}

async function loadJson(path) {
  const r = await fetch(path + '?t=' + Date.now());
  if (!r.ok) throw new Error(path + ' → HTTP ' + r.status);
  return r.json();
}

async function init() {
  try {
    SUMMARY = await loadJson('data/summary.json');
  } catch (e) {
    document.getElementById('stamp').textContent = 'no data yet';
    notice(
      '<strong>No collected data yet.</strong><br>' +
      'The collector has not produced <code>data/summary.json</code>. If you have just set this up: ' +
      'add the three repository secrets, run the workflow once with <code>create_jobs</code> ticked, ' +
      'then wait up to 48 hours for YouTube to generate the first reports. ' +
      'Roughly 30 days of history are backfilled automatically.<br><br>' +
      '<span style="color:var(--muted)">' + e.message + '</span>', true);
    return;
  }
  try { DAILY = await loadJson('data/daily.json'); } catch (e) { /* optional */ }

  const when = SUMMARY.generated_at ? new Date(SUMMARY.generated_at) : null;
  document.getElementById('stamp').textContent =
    when ? 'updated ' + when.toLocaleString() : '';

  renderMetrics();
  renderSpark();
  render();
}

function currentRows() {
  const w = (SUMMARY.windows || {})[currentWindow] || {};
  const meta = SUMMARY.video_meta || {};
  let rows = Object.keys(w).map(id => {
    const d = w[id], m = meta[id] || {};
    const eng = d.views ? ((d.likes + d.comments + d.shares) / d.views) * 100 : null;
    return Object.assign({ id, title: m.title || id, thumb: m.thumbnail,
                           published: m.published_at, engagement: eng }, d);
  });
  if (filter) {
    const f = filter.toLowerCase();
    rows = rows.filter(r => (r.title || '').toLowerCase().includes(f));
  }
  rows.sort((a, b) => {
    let x = a[sortKey], y = b[sortKey];
    if (sortKey === 'title') return sortDir * String(x).localeCompare(String(y));
    x = (x === null || x === undefined) ? -Infinity : x;
    y = (y === null || y === undefined) ? -Infinity : y;
    return sortDir * (x - y);
  });
  return rows;
}

function renderMetrics() {
  const w = (SUMMARY.windows || {})[currentWindow] || {};
  const vals = Object.values(w);
  const imps = vals.reduce((s, v) => s + (v.impressions || 0), 0);
  const views = vals.reduce((s, v) => s + (v.views || 0), 0);
  const wt = vals.reduce((s, v) => s + (v.watch_time_minutes || 0), 0);
  const subs = vals.reduce((s, v) => s + (v.subscribers_gained || 0), 0);
  // Channel CTR must be total clicks over total impressions, never a mean of
  // per-video CTRs, which would weight a 50-impression video like a 50k one.
  const clicks = vals.reduce((s, v) =>
    s + ((v.impressions || 0) * ((v.ctr || 0) / 100)), 0);
  const ctr = imps ? (clicks / imps) * 100 : null;
  const ch = SUMMARY.channel || {};

  const cards = [
    ['Subscribers', fmt(ch.subscriber_count)],
    ['Impressions', fmt(imps)],
    ['CTR', pct(ctr)],
    ['Views', fmt(views)],
    ['Watch time', mins(wt)],
    ['Subs gained', fmt(subs)],
    ['Videos', fmt(vals.length)],
  ];
  document.getElementById('metrics').innerHTML = cards.map(
    ([l, v]) => `<div class="metric"><div class="label">${l}</div><div class="value">${v}</div></div>`
  ).join('');
}

function renderSpark() {
  const svg = document.getElementById('spark');
  if (!DAILY || !DAILY.series || DAILY.series.length < 2) { svg.classList.add('hidden'); return; }
  const days = currentWindow === 'all' ? DAILY.series.length
             : parseInt(currentWindow) || DAILY.series.length;
  const s = DAILY.series.slice(-days);
  const W = 1200, H = 90, pad = 4;
  const max = Math.max(...s.map(d => d.impressions || 0), 1);
  const step = s.length > 1 ? (W - pad * 2) / (s.length - 1) : 0;
  const pts = s.map((d, i) =>
    `${pad + i * step},${H - pad - ((d.impressions || 0) / max) * (H - pad * 2)}`).join(' ');
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML =
    `<polyline fill="none" stroke="var(--accent)" stroke-width="2" points="${pts}" />` +
    `<text x="${pad}" y="12" fill="var(--muted)" font-size="11">` +
    `impressions/day · peak ${fmt(max)}</text>`;
  svg.classList.remove('hidden');
}

function ctrClass(v) {
  if (v === null || v === undefined) return '';
  if (v >= 6) return 'good';
  if (v >= 3) return 'warn';
  return 'bad';
}

function render() {
  const rows = currentRows();
  document.getElementById('rows').innerHTML = rows.map(r => `
    <tr>
      <td>
        <div class="title-cell">
          ${r.thumb ? `<img src="${r.thumb}" alt="" loading="lazy">` : ''}
          <div>
            <div>${(r.title || r.id).replace(/</g, '&lt;')}</div>
            <div class="sub">${r.published ? new Date(r.published).toLocaleDateString() : r.id}</div>
          </div>
        </div>
      </td>
      <td>${fmt(r.impressions)}</td>
      <td class="${ctrClass(r.ctr)}">${pct(r.ctr)}</td>
      <td>${fmt(r.views)}</td>
      <td>${pct(r.avg_view_percentage)}</td>
      <td>${mins(r.watch_time_minutes)}</td>
      <td>${fmt(r.subscribers_gained)}</td>
      <td>${pct(r.engagement)}</td>
    </tr>`).join('') ||
    '<tr><td colspan="8" style="color:var(--muted);padding:20px;">No videos in this window.</td></tr>';
}

document.querySelectorAll('[data-window]').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('[data-window]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentWindow = b.dataset.window;
    renderMetrics(); renderSpark(); render();
  });
});

document.querySelectorAll('[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const k = th.dataset.sort;
    if (sortKey === k) sortDir = -sortDir;
    else { sortKey = k; sortDir = k === 'title' ? 1 : -1; }
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  filter = e.target.value; render();
});

init();
</script>
</body>
</html>
